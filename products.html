<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Katalog Produk - PT Go Nusantara</title>
    <link rel="stylesheet" href="css/style.css">
    <style>
        /* CSS Tambahan agar grid bawaan Anda dipaksa muncul mendesak layar */
        .product-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 20px;
            padding: 20px 0;
            min-height: 200px;
        }
        .product-card {
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            padding: 15px;
            text-align: center;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .product-card img {
            max-width: 100%;
            height: auto;
            border-radius: 4px;
        }
    </style>
</head>
<body>

<header class="header">
    <div class="container">
        <h1>PT GO NUSANTARA</h1>
        <div class="menu-toggle">☰</div>
        <nav class="navbar">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="products.html">Products</a></li>
                <li><a href="index.html#about">About</a></li>
                <li><a href="index.html#contact">Contact</a></li>
            </ul>
        </nav>
    </div>
</header>

<section class="hero">
    <div class="container">
        <h2>Katalog Produk Industrial</h2>
        <p>Pneumatic • Hydraulic • Valve • Sensor • Control System</p>
    </div>
</section>

<section class="products" style="padding: 60px 0; min-height: 400px;">
    <div class="container">
        
        <div class="filter-buttons" style="margin-bottom: 30px; text-align: center;">
            <button onclick="filterProducts('all', this)" class="active">All</button>
            <button onclick="filterProducts('pneumatic-and-hydraulics', this)">Pneumatic</button>
            <button onclick="filterProducts('sensor-and-switch', this)">Sensor</button>
            <button onclick="filterProducts('sanitary-valves-and-fitting', this)">Valve</button>
        </div>
        
        <div id="productGrid" class="product-grid">
            <p style="text-align: center; width: 100%; color: #666;">Memuat data katalog...</p>
        </div>

    </div>
</section>

<footer>
    <div class="container">
        <p>© 2026 PT Go Nusantara</p>
    </div>
</footer>

<script src="js/main.js"></script>
</body>
</html>
